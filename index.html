<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>랜덤 강아지 생성기 프로</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f7fb;
      font-family: "Segoe UI", sans-serif;
      padding: 20px;
      transition: background 0.5s ease; /* 배경색 변경을 부드럽게 */
    }

    .card {
      width: 100%;
      max-width: 500px;
      background: white;
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 10px;
      color: #333;
    }

    /* 통계 영역 */
    .stats {
      display: flex;
      justify-content: space-around;
      margin-bottom: 15px;
      font-size: 14px;
      color: #555;
      font-weight: bold;
    }

    .image-box {
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border-radius: 16px;
      background: #eee;
      margin-bottom: 20px;
      position: relative;
    }

    #dogImage {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #loading {
      margin-bottom: 15px;
      color: #666;
      font-size: 14px;
      font-weight: 500;
    }

    /* 버튼 그룹 스타일 */
    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    button {
      background: #4f7cff;
      color: white;
      border: none;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
      font-weight: 600;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    button:active {
      transform: translateY(0);
    }

    /* 기능별 버튼 색상 구분 */
    #newDogBtn { background: #4f7cff; grid-column: span 2; padding: 14px; font-size: 16px; }
    #likeBtn { background: #ff4f79; }
    #downloadBtn { background: #10b981; }
    #autoBtn { background: #f59e0b; grid-column: span 2; }
    #autoBtn.active { background: #ef4444; }

    @media (max-width: 600px) {
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>🐶 랜덤 강아지 생성기</h1>
    
    <div class="stats">
      <span>📸 본 강아지: <span id="viewCount">0</span>마리</span>
      <span>❤️ 좋아요한 강아지: <span id="likeCount">0</span>마리</span>
    </div>

    <div class="image-box">
      <img id="dogImage" alt="강아지 사진">
    </div>

    <p id="loading">강아지 사진을 불러오는 중...</p>

    <div class="btn-group">
      <button id="newDogBtn">새로운 강아지 보기 🔄</button>
      
      <button id="likeBtn">좋아요 ❤️</button>
      
      <button id="downloadBtn">사진 저장 💾</button>
      
      <button id="autoBtn">자동 재생 시작 ▶️</button>
    </div>
  </div>

  <script>
    const dogImage = document.getElementById("dogImage");
    const loading = document.getElementById("loading");
    const newDogBtn = document.getElementById("newDogBtn");
    const likeBtn = document.getElementById("likeBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const autoBtn = document.getElementById("autoBtn");
    
    const viewCountEl = document.getElementById("viewCount");
    const likeCountEl = document.getElementById("likeCount");

    // 상태 관리 변수
    let totalViewed = 0;
    let likedDogs = [];
    let slideInterval = null;
    let currentImgUrl = "";

    // [기능 3] 파스텔톤 랜덤 배경색 리스트
    const pastelColors = [
      "#ffe5ec", "#d8f3dc", "#e8e8e4", "#fcd5ce", 
      "#ece4db", "#d8e2dc", "#ffe5d9", "#e2ece9", "#e0aafb"
    ];

    function changeBackgroundColor() {
      const randomIndex = Math.floor(Math.random() * pastelColors.length);
      document.body.style.background = pastelColors[randomIndex];
    }

    // 메인 API 호출 함수
    async function getDogImage() {
      loading.textContent = "강아지 사진을 불러오는 중...";
      
      try {
        const response = await fetch("https://dog.ceo/api/breeds/image/random");
        const data = await response.json();

        currentImgUrl = data.message;
        dogImage.src = currentImgUrl;

        dogImage.onload = () => {
          loading.textContent = "사진 불러오기 완료!";
          
          // [기능 1] 카운트 증가 및 반영
          totalViewed++;
          viewCountEl.textContent = totalViewed;
          
          // [기능 3] 배경색 바꾸기
          changeBackgroundColor();
        };

      } catch (error) {
        loading.textContent = "사진을 불러오지 못했습니다.";
        console.error(error);
      }
    }

    // [기능 2] 좋아요 기능
    likeBtn.addEventListener("click", () => {
      if (!currentImgUrl || likedDogs.includes(currentImgUrl)) return;
      
      likedDogs.push(currentImgUrl);
      likeCountEl.textContent = likedDogs.length;
      alert("이 강아지를 좋아요 목록에 저장했습니다! ❤️");
    });

    // [기능 4] 사진 다운로드 기능 (CORS 우회)
    downloadBtn.addEventListener("click", async () => {
      if (!currentImgUrl) return;
      
      try {
        loading.textContent = "이미지 다운로드 중...";
        const response = await fetch(currentImgUrl);
        const blob = await response.blob();
        const blobUrl = URL.createObjectURL(blob);
        
        const a = document.createElement("a");
        a.href = blobUrl;
        a.download = `dog-${Date.now()}.jpg`; // 겹치지 않는 파일명
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(blobUrl);
        
        loading.textContent = "다운로드 완료!";
      } catch (error) {
        alert("이미지 저장에 실패했습니다.");
        console.error(error);
      }
    });

    // [기능 5] 자동 슬라이드 쇼 토글 기능
    autoBtn.addEventListener("click", () => {
      if (slideInterval) {
        // 재생 중이면 멈춤
        clearInterval(slideInterval);
        slideInterval = null;
        autoBtn.textContent = "자동 재생 시작 ▶️";
        autoBtn.classList.remove("active");
      } else {
        // 멈춰있으면 시작 (3초 간격)
        getDogImage(); // 누르자마자 한
